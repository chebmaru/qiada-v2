<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Arial, sans-serif">
  <rect width="900" height="450" fill="#f0f4f0"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">LA RETROMARCIA</text>
  <text x="450" y="50" text-anchor="middle" fill="#555" font-size="15">Manovra da effettuare con massima prudenza</text>

  <!-- Road — wide lanes -->
  <rect x="60" y="90" width="780" height="120" fill="#555"/>
  <!-- Top edge line -->
  <line x1="60" y1="92" x2="840" y2="92" stroke="#fff" stroke-width="2.5"/>
  <!-- Center dashed line -->
  <line x1="60" y1="150" x2="840" y2="150" stroke="#fff" stroke-width="2" stroke-dasharray="20,14"/>
  <!-- Bottom edge line -->
  <line x1="60" y1="208" x2="840" y2="208" stroke="#fff" stroke-width="2.5"/>

  <!-- Direction arrows -->
  <g opacity="0.3">
    <polygon points="200,120 180,117 200,114" fill="#fff"/>
    <polygon points="650,180 670,183 650,186" fill="#fff"/>
  </g>

  <!-- Blue car (bottom lane, going right) performing reverse -->
  <g transform="translate(375, 180)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
    <rect x="10" y="-9" width="8" height="18" rx="2" fill="#93c5fd" opacity="0.6"/>
    <!-- Reverse lights at back (left side) -->
    <rect x="-24" y="-8" width="4" height="6" rx="1" fill="#fff"/>
    <rect x="-24" y="2" width="4" height="6" rx="1" fill="#fff"/>
  </g>

  <!-- Dashed arrow showing backward movement -->
  <line x1="348" y1="180" x2="250" y2="185" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="8,5"/>
  <polygon points="250,185 264,179 262,191" fill="#2563eb"/>

  <!-- Orange car behind (to the right) -->
  <g transform="translate(650, 180)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#f59e0b" stroke="#b45309" stroke-width="1.5"/>
    <rect x="-18" y="-9" width="8" height="18" rx="2" fill="#fde68a" opacity="0.6"/>
  </g>

  <!-- Warning between cars -->
  <text x="510" y="185" text-anchor="middle" fill="#dc2626" font-size="20" font-weight="bold">!</text>

  <!-- Labels ON the road with background for readability -->
  <!-- Blue car = RETROMARCIA -->
  <rect x="325" y="155" width="100" height="16" rx="3" fill="#000" opacity="0.4"/>
  <text x="375" y="167" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">RETROMARCIA</text>


  <rect x="195" y="187" width="130" height="14" rx="3" fill="#000" opacity="0.4"/>
  <text x="260" y="198" text-anchor="middle" fill="#93c5fd" font-size="11" font-style="italic">dir. retromarcia</text>

  <!-- Steps section -->
  <text x="60" y="252" fill="#1a1a1a" font-size="14" font-weight="bold">Regole fondamentali:</text>

  <circle cx="75" cy="272" r="10" fill="#2563eb"/>
  <text x="75" y="276" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">1</text>
  <text x="92" y="276" fill="#333" font-size="13">Assicurarsi che la strada sia libera dietro e ai lati</text>

  <circle cx="75" cy="296" r="10" fill="#dc2626"/>
  <text x="75" y="300" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">2</text>
  <text x="92" y="300" fill="#333" font-size="13">NON consentita su autostrade e strade a scorrimento veloce</text>

  <circle cx="75" cy="320" r="10" fill="#dc2626"/>
  <text x="75" y="324" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">3</text>
  <text x="92" y="324" fill="#333" font-size="13">NON consentita in prossimita di curve, dossi e incroci</text>

  <!-- Info boxes -->
  <rect x="60" y="345" width="380" height="55" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/>
  <text x="250" y="365" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="bold">VIETATA</text>
  <text x="250" y="383" text-anchor="middle" fill="#555" font-size="12">Autostrade, curve, dossi, incroci, scarsa visibilita</text>

  <rect x="460" y="345" width="380" height="55" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/>
  <text x="650" y="365" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="bold">CONSENTITA</text>
  <text x="650" y="383" text-anchor="middle" fill="#555" font-size="12">Strade urbane ed extraurbane (con cautela)</text>

  <!-- Yellow reminder -->
  <g transform="translate(60,410)">
    <rect x="0" y="0" width="780" height="30" rx="6" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
    <text x="390" y="20" text-anchor="middle" fill="#856404" font-size="13">Chi fa retromarcia deve SEMPRE dare la precedenza a tutti gli altri veicoli</text>
  </g>
</svg>