<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, sans-serif">
  <rect width="900" height="520" fill="#f0f4f0"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">SORPASSO IN PROSSIMITA DI UN DOSSO</text>
  <text x="450" y="52" text-anchor="middle" fill="#dc2626" font-size="15" font-weight="bold">VIETATO — visibilita insufficiente</text>

  <!-- ========== SIDE VIEW: Road with hump/dosso ========== -->
  <!-- Ground/terrain -->
  <path d="M 0,330 L 100,330 C 200,330 300,315 400,250 C 450,218 500,218 550,250 C 650,315 750,330 850,330 L 900,330 L 900,380 L 0,380 Z" fill="#8B7355"/>

  <!-- Road surface on top of terrain (wider: 70px per lane = 140px total) -->
  <path d="M 0,260 L 100,260 C 200,260 300,245 400,180 C 450,148 500,148 550,180 C 650,245 750,260 850,260 L 900,260 L 900,330 L 850,330 C 750,330 650,315 550,250 C 500,218 450,218 400,250 C 300,315 200,330 100,330 L 0,330 Z" fill="#555"/>

  <!-- Center dashed line (follows the hump) -->
  <path d="M 0,295 C 200,295 300,280 400,215 C 450,183 500,183 550,215 C 650,280 750,295 850,295" fill="none" stroke="#fff" stroke-width="2" stroke-dasharray="15,10"/>

  <!-- Top road edge -->
  <path d="M 0,262 C 200,262 300,247 400,182 C 450,150 500,150 550,182 C 650,247 750,262 850,262" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Bottom road edge -->
  <path d="M 0,328 C 200,328 300,313 400,248 C 450,216 500,216 550,248 C 650,313 750,328 850,328" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Grass below road -->
  <path d="M 0,330 L 100,330 C 200,330 300,315 400,250 C 450,218 500,218 550,250 C 650,315 750,330 850,330 L 900,330 L 900,380 L 0,380 Z" fill="#6b8f4a" opacity="0.4"/>

  <!-- ========== CARS ========== -->
  <!-- Red car A — bottom lane at x=220 (center≈283, bottom≈316 → lane center≈299) -->
  <g transform="translate(220, 299) rotate(-3)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#dc2626" stroke="#991b1b" stroke-width="1.5"/>
    <rect x="10" y="-9" width="8" height="18" rx="2" fill="#fca5a5" opacity="0.6"/>
  </g>
  <circle cx="220" cy="277" r="11" fill="#dc2626"/>
  <text x="220" y="282" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">A</text>

  <!-- Blue car — bottom lane at x=350 (center≈241, bottom≈274 → lane center≈257) -->
  <g transform="translate(350, 257) rotate(-12)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
    <rect x="10" y="-9" width="8" height="18" rx="2" fill="#93c5fd" opacity="0.6"/>
  </g>

  <!-- Hidden car — top lane at x=640 (top≈228, center≈261 → lane center≈244) -->
  <g transform="translate(640, 244) rotate(8)" opacity="0.4">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#f59e0b" stroke="#b45309" stroke-width="1.5"/>
    <rect x="-18" y="-9" width="8" height="18" rx="2" fill="#fde68a" opacity="0.6"/>
  </g>
  <!-- Question mark — can't see this car -->
  <text x="640" y="224" text-anchor="middle" fill="#f59e0b" font-size="22" font-weight="bold">?</text>

  <!-- Big X on the overtaking attempt -->
  <g transform="translate(280, 245)">
    <line x1="-15" y1="-15" x2="15" y2="15" stroke="#dc2626" stroke-width="4"/>
    <line x1="15" y1="-15" x2="-15" y2="15" stroke="#dc2626" stroke-width="4"/>
  </g>

  <!-- Dashed arrow showing attempted overtake path -->
  <path d="M 240,292 C 270,270 310,245 360,235" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- "NON SI VEDE" label with arrow -->
  <rect x="410" y="148" width="130" height="22" rx="4" fill="#000" opacity="0.5"/>
  <text x="475" y="164" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">NON SI VEDE!</text>
  <line x1="475" y1="170" x2="475" y2="185" stroke="#dc2626" stroke-width="2"/>
  <polygon points="470,183 475,192 480,183" fill="#dc2626"/>

  <!-- Dosso label -->
  <rect x="420" y="195" width="60" height="18" rx="3" fill="#000" opacity="0.4"/>
  <text x="450" y="208" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">DOSSO</text>

  <!-- ========== INFO BOXES ========== -->
  <rect x="50" y="365" width="390" height="80" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/>
  <text x="245" y="390" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="bold">PERCHE E VIETATO</text>
  <circle cx="72" cy="410" r="5" fill="#dc2626"/>
  <text x="84" y="414" fill="#555" font-size="13">Non si vede cosa arriva dall'altra parte</text>
  <circle cx="72" cy="432" r="5" fill="#dc2626"/>
  <text x="84" y="436" fill="#555" font-size="13">Rischio di scontro frontale</text>

  <rect x="460" y="365" width="390" height="80" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/>
  <text x="655" y="390" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="bold">COSA FARE</text>
  <circle cx="482" cy="410" r="5" fill="#16a34a"/>
  <text x="494" y="414" fill="#555" font-size="13">Rallentare prima del dosso</text>
  <circle cx="482" cy="432" r="5" fill="#16a34a"/>
  <text x="494" y="436" fill="#555" font-size="13">Aspettare visibilita completa</text>

  <!-- Yellow reminder -->
  <rect x="50" y="460" width="800" height="40" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="450" y="477" text-anchor="middle" fill="#856404" font-size="14" font-weight="bold">DOSSO = DOppio Senso → se doppio senso, sorpasso VIETATO</text>
  <text x="450" y="494" text-anchor="middle" fill="#856404" font-size="13">Il dosso nasconde i veicoli in arrivo — MAI sorpassare senza visibilita completa</text>
</svg>
