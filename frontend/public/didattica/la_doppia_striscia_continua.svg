<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Arial, sans-serif">
  <rect width="900" height="400" fill="#f0f4f0"/>
  <text x="450" y="32" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">LA DOPPIA STRISCIA CONTINUA</text>
  <text x="450" y="52" text-anchor="middle" fill="#555" font-size="15">Divieto ASSOLUTO di superamento — da entrambi i lati</text>

  <!-- Road (single block, two lanes, wider) -->
  <rect x="50" y="68" width="800" height="140" fill="#555"/>
  <!-- Top edge line -->
  <line x1="50" y1="70" x2="850" y2="70" stroke="#fff" stroke-width="2.5"/>
  <!-- Bottom edge line -->
  <line x1="50" y1="206" x2="850" y2="206" stroke="#fff" stroke-width="2.5"/>
  <!-- Double continuous white lines at center -->
  <line x1="50" y1="132" x2="850" y2="132" stroke="#fff" stroke-width="4"/>
  <line x1="50" y1="144" x2="850" y2="144" stroke="#fff" stroke-width="4"/>

  <!-- Direction arrows on road -->
  <g opacity="0.35">
    <!-- Bottom lane → right -->
    <polygon points="720,175 740,178 720,181" fill="#fff"/>
    <polygon points="620,175 640,178 620,181" fill="#fff"/>
    <!-- Top lane ← left -->
    <polygon points="250,100 230,103 250,106" fill="#fff"/>
    <polygon points="350,100 330,103 350,106" fill="#fff"/>
  </g>

  <!-- Labels on road -->
  <g transform="translate(450, 178)">
    <rect x="-60" y="-12" width="120" height="20" rx="3" fill="#000" opacity="0.4"/>
    <text x="0" y="4" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">Senso → destra</text>
  </g>
  <g transform="translate(450, 98)">
    <rect x="-60" y="-12" width="120" height="20" rx="3" fill="#000" opacity="0.4"/>
    <text x="0" y="4" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">Senso ← sinistra</text>
  </g>

  <!-- Green car in bottom lane (correct, staying in lane) -->
  <g transform="translate(600, 178)">
    <rect x="-24" y="-13" width="48" height="26" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
    <rect x="12" y="-10" width="8" height="20" rx="2" fill="#86efac" opacity="0.6"/>
  </g>
  <!-- Checkmark near green car -->
  <text x="635" y="172" fill="#16a34a" font-size="16" font-weight="bold">&#x2713;</text>

  <!-- Red car in top lane attempting to cross the double line -->
  <g transform="translate(250, 120)" opacity="0.8">
    <rect x="-24" y="-13" width="48" height="26" rx="6" fill="#dc2626" stroke="#991b1b" stroke-width="1.5"/>
    <rect x="-20" y="-10" width="8" height="20" rx="2" fill="#fca5a5" opacity="0.6"/>
    <!-- Angled to show crossing attempt -->
  </g>
  <!-- Dashed path showing attempted crossing -->
  <line x1="260" y1="135" x2="275" y2="160" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- X mark on red car -->
  <line x1="240" y1="100" x2="252" y2="112" stroke="#dc2626" stroke-width="3"/>
  <line x1="252" y1="100" x2="240" y2="112" stroke="#dc2626" stroke-width="3"/>
  <text x="246" y="96" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="bold">VIETATO</text>

  <!-- Label pointing to double line (outside road, below) -->
  <line x1="150" y1="208" x2="150" y2="225" stroke="#e65100" stroke-width="1.5"/>
  <text x="150" y="240" text-anchor="middle" fill="#e65100" font-size="15" font-weight="bold">Doppia continua</text>

  <!-- Comparison info boxes -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="260" height="65" rx="8" fill="#fff" stroke="#dc2626" stroke-width="1.5"/>
    <text x="130" y="25" text-anchor="middle" fill="#dc2626" font-size="18" font-weight="bold">NESSUNA eccezione</text>
    <text x="130" y="48" text-anchor="middle" fill="#555" font-size="14">nemmeno per ostacoli</text>
  </g>

  <g transform="translate(325, 250)">
    <rect x="0" y="0" width="260" height="65" rx="8" fill="#fff" stroke="#16a34a" stroke-width="1.5"/>
    <text x="130" y="25" text-anchor="middle" fill="#16a34a" font-size="18" font-weight="bold">Separazione DEFINITIVA</text>
    <text x="130" y="48" text-anchor="middle" fill="#555" font-size="14">dei sensi di marcia</text>
  </g>

  <g transform="translate(600, 250)">
    <rect x="0" y="0" width="250" height="65" rx="8" fill="#fff" stroke="#555" stroke-width="1"/>
    <text x="125" y="25" text-anchor="middle" fill="#555" font-size="14">Singola continua = vietato superare</text>
    <text x="125" y="48" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">Doppia = vietato per ENTRAMBI</text>
  </g>

  <!-- Yellow reminder box -->
  <g transform="translate(50, 330)">
    <rect x="0" y="0" width="800" height="55" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1"/>
    <text x="400" y="22" text-anchor="middle" fill="#856404" font-size="16" font-weight="bold">Ricorda</text>
    <text x="400" y="44" text-anchor="middle" fill="#856404" font-size="14">Doppia continua = divieto ASSOLUTO da entrambi i lati, senza eccezioni</text>
  </g>
</svg>