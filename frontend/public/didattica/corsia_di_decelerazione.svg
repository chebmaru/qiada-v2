<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <rect width="900" height="500" fill="#f0f4f0"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">CORSIA DI DECELERAZIONE</text>
  <text x="450" y="57" text-anchor="middle" fill="#555" font-size="15">Per uscire dalla corrente di traffico — vista dall'alto</text>

  <!-- ========== MAIN ROAD (2 lanes, going RIGHT →) ========== -->
  <!-- Top lane -->
  <rect x="50" y="120" width="800" height="55" fill="#555"/>
  <line x1="50" y1="122" x2="850" y2="122" stroke="#fff" stroke-width="2.5"/>
  <line x1="50" y1="175" x2="850" y2="175" stroke="#fff" stroke-width="2" stroke-dasharray="20,14"/>
  <!-- Bottom lane -->
  <rect x="50" y="175" width="800" height="55" fill="#555"/>
  <line x1="50" y1="228" x2="130" y2="228" stroke="#fff" stroke-width="2.5"/>
  <!-- Dashed line between main road and deceleration lane (can exit) -->
  <line x1="130" y1="228" x2="530" y2="228" stroke="#fff" stroke-width="2.5" stroke-dasharray="20,14"/>
  <line x1="530" y1="228" x2="850" y2="228" stroke="#fff" stroke-width="2.5"/>

  <!-- Direction arrows on main road -->
  <g opacity="0.4">
    <polygon points="200,142 220,147 200,152" fill="#fff"/>
    <polygon points="600,195 620,200 600,205" fill="#fff"/>
  </g>

  <!-- ========== DECELERATION LANE + CURVED RAMP ========== -->
  <!-- Deceleration lane — triangular taper zone (from x=130 to x=530) -->
  <!-- Zero width at x=130, full width at x=530 -->
  <polygon points="130,228 530,228 530,283" fill="#555"/>
  <!-- Bottom edge of deceleration lane -->
  <line x1="130" y1="228" x2="530" y2="283" stroke="#fff" stroke-width="2.5"/>

  <!-- Curved ramp from deceleration lane end to below-right -->
  <!-- Ramp road surface — filled path (mirrored from acceleration lane) -->
  <path d="M 530,228 C 690,228 810,235 810,355 L 810,420 L 755,420 L 755,340 C 755,290 690,283 530,283 Z" fill="#555"/>

  <!-- Ramp edge lines -->
  <!-- Outer edge -->
  <path d="M 530,228 C 690,228 810,270 810,355" fill="none" stroke="#fff" stroke-width="2.5"/>
  <line x1="810" y1="355" x2="810" y2="420" stroke="#fff" stroke-width="2.5"/>
  <!-- Inner edge -->
  <path d="M 530,283 C 680,283 755,285 755,340" fill="none" stroke="#fff" stroke-width="2.5"/>
  <line x1="755" y1="340" x2="755" y2="420" stroke="#fff" stroke-width="2.5"/>

  <!-- Ramp label -->
  <text x="783" y="400" text-anchor="middle" fill="#ddd" font-size="11" font-weight="bold" transform="rotate(-90,783,400)">RAMPA</text>

  <!-- ========== CARS ========== -->

  <!-- Blue car — on main road, bottom lane, approaching deceleration zone -->
  <g transform="translate(200, 200)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
    <rect x="10" y="-9" width="8" height="18" rx="2" fill="#93c5fd" opacity="0.6"/>
  </g>

  <!-- Green car — in deceleration lane, decelerating -->
  <g transform="translate(400, 248)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
    <rect x="10" y="-9" width="8" height="18" rx="2" fill="#86efac" opacity="0.6"/>
  </g>

  <!-- Orange car — on the ramp, exiting -->
  <g transform="translate(783, 360)">
    <rect x="-12" y="-22" width="24" height="44" rx="6" fill="#f59e0b" stroke="#b45309" stroke-width="1.5"/>
    <rect x="-9" y="6" width="18" height="8" rx="2" fill="#fde68a" opacity="0.6"/>
  </g>

  <!-- Exit arrow path -->
  <defs>
    <marker id="arrExit" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#dc2626"/>
    </marker>
  </defs>
  <path d="M 225,205 C 300,220 380,240 420,248" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrExit)"/>

  <!-- ========== LABELS ========== -->

  <!-- "Rallentare qui" label -->
  <rect x="310" y="262" width="130" height="22" rx="4" fill="#dc2626" opacity="0.9"/>
  <text x="375" y="278" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Rallentare qui</text>

  <!-- Bracket for deceleration lane -->
  <line x1="130" y1="235" x2="130" y2="310" stroke="#e65100" stroke-width="1.5"/>
  <line x1="530" y1="293" x2="530" y2="310" stroke="#e65100" stroke-width="1.5"/>
  <line x1="130" y1="308" x2="530" y2="308" stroke="#e65100" stroke-width="2"/>
  <text x="330" y="328" text-anchor="middle" fill="#e65100" font-size="14" font-weight="bold">Corsia di decelerazione</text>

  <!-- Main road label -->
  <rect x="550" y="140" width="140" height="22" rx="4" fill="#000" opacity="0.4"/>
  <text x="620" y="156" text-anchor="middle" fill="#ddd" font-size="13" font-weight="bold">STRADA PRINCIPALE</text>

  <!-- USCITA label -->
  <rect x="758" y="415" width="50" height="22" rx="4" fill="#000" opacity="0.7"/>
  <text x="783" y="431" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">USCITA</text>

  <!-- ========== RULES BOX ========== -->
  <rect x="60" y="355" width="680" height="120" rx="10" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="400" y="382" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">Regole</text>

  <g transform="translate(100, 395)">
    <circle cx="14" cy="12" r="14" fill="#f59e0b"/>
    <text x="14" y="17" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1</text>
    <text x="40" y="17" fill="#333" font-size="14">Segnalare con la freccia destra, restare nella corsia di marcia</text>
  </g>

  <g transform="translate(100, 428)">
    <circle cx="14" cy="12" r="14" fill="#16a34a"/>
    <text x="14" y="17" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">2</text>
    <text x="40" y="17" fill="#333" font-size="14">Spostarsi nella corsia di decelerazione, rallentare <tspan font-weight="bold">solo lì</tspan></text>
  </g>

  <g transform="translate(100, 461)">
    <circle cx="14" cy="12" r="14" fill="#dc2626"/>
    <text x="14" y="17" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">!</text>
    <text x="40" y="17" fill="#333" font-size="14">MAI rallentare sulla corsia di marcia</text>
  </g>
</svg>
