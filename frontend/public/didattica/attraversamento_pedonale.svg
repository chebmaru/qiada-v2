<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="720" fill="#f0f4f0"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">ATTRAVERSAMENTO PEDONALE</text>
  <text x="450" y="60" text-anchor="middle" fill="#555" font-size="15">Regole per il conducente</text>

  <!-- Road -->
  <rect x="50" y="100" width="800" height="160" fill="#555" rx="4"/>
  <!-- Edge lines -->
  <line x1="50" y1="102" x2="850" y2="102" stroke="#fff" stroke-width="2.5"/>
  <line x1="50" y1="258" x2="850" y2="258" stroke="#fff" stroke-width="2.5"/>
  <!-- Center dashed line -->
  <line x1="50" y1="180" x2="400" y2="180" stroke="#fff" stroke-width="2.5" stroke-dasharray="25,18"/>
  <line x1="560" y1="180" x2="850" y2="180" stroke="#fff" stroke-width="2.5" stroke-dasharray="25,18"/>

  <!-- Direction arrows on road -->
  <g opacity="0.4">
    <!-- Bottom lane arrow (right) -->
    <polygon points="150,225 170,220 150,215" fill="#fff"/>
    <!-- Top lane arrow (left) -->
    <polygon points="780,145 760,140 780,135" fill="#fff"/>
  </g>

  <!-- Zebra crossing stripes (horizontal, parallel to traffic) -->
  <g>
    <rect x="440" y="105" width="120" height="12" fill="#fff" opacity="0.95"/>
    <rect x="440" y="125" width="120" height="12" fill="#fff" opacity="0.95"/>
    <rect x="440" y="145" width="120" height="12" fill="#fff" opacity="0.95"/>
    <rect x="440" y="165" width="120" height="12" fill="#fff" opacity="0.95"/>
    <rect x="440" y="185" width="120" height="12" fill="#fff" opacity="0.95"/>
    <rect x="440" y="205" width="120" height="12" fill="#fff" opacity="0.95"/>
    <rect x="440" y="225" width="120" height="12" fill="#fff" opacity="0.95"/>
    <rect x="440" y="245" width="120" height="12" fill="#fff" opacity="0.95"/>
  </g>

  <!-- Segnale ministeriale: mostrato come <img> separata nella pagina (topic-signs.json) -->

  <!-- Blue car stopped before crossing (bottom lane, going right) -->
  <g transform="translate(340, 220)">
    <rect x="-30" y="-16" width="60" height="32" rx="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
    <!-- Windshield (right side = direction car faces) -->
    <rect x="16" y="-12" width="10" height="24" rx="3" fill="#93c5fd" opacity="0.7"/>
    <!-- Rear window -->
    <rect x="-24" y="-12" width="8" height="24" rx="3" fill="#93c5fd" opacity="0.4"/>
  </g>

  <!-- Stop lines before crossing -->
  <rect x="420" y="185" width="4" height="70" fill="#fff" opacity="0.8"/>

  <!-- STOP label on car -->
  <g transform="translate(340, 252)">
    <rect x="-22" y="-10" width="44" height="18" rx="3" fill="#000" opacity="0.4"/>
    <text x="0" y="3" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">STOP</text>
  </g>

  <!-- Pedestrian on the crossing -->
  <g transform="translate(490, 155)">
    <!-- Head -->
    <circle cx="0" cy="-18" r="8" fill="#f59e0b"/>
    <!-- Body -->
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#f59e0b" stroke-width="3"/>
    <!-- Arms -->
    <line x1="-12" y1="-2" x2="12" y2="-2" stroke="#f59e0b" stroke-width="2.5"/>
    <!-- Left leg (walking) -->
    <line x1="0" y1="10" x2="-8" y2="25" stroke="#f59e0b" stroke-width="2.5"/>
    <!-- Right leg (walking) -->
    <line x1="0" y1="10" x2="8" y2="25" stroke="#f59e0b" stroke-width="2.5"/>
  </g>

  <!-- Walking direction arrow -->
  <g opacity="0.6">
    <line x1="490" y1="190" x2="490" y2="240" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="486,238 490,248 494,238" fill="#f59e0b"/>
  </g>

  <!-- Label on road: direction indicator -->
  <g transform="translate(200, 135)">
    <rect x="-55" y="-12" width="110" height="22" rx="3" fill="#000" opacity="0.4"/>
    <text x="0" y="3" text-anchor="middle" fill="#ddd" font-size="13" font-weight="bold">Corsia opposta</text>
  </g>
  <g transform="translate(200, 225)">
    <rect x="-55" y="-12" width="110" height="22" rx="3" fill="#000" opacity="0.4"/>
    <text x="0" y="3" text-anchor="middle" fill="#ddd" font-size="13" font-weight="bold">Direzione marcia</text>
  </g>

  <!-- Rules section -->
  <g transform="translate(50, 290)">
    <text x="0" y="0" fill="#1a1a1a" font-size="18" font-weight="bold">Regole fondamentali:</text>

    <!-- Rule 1 -->
    <circle cx="18" cy="30" r="14" fill="#2563eb"/>
    <text x="18" y="35" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">1</text>
    <text x="42" y="35" fill="#333" font-size="14">Rallentare e fermarsi per dare precedenza ai pedoni sulle strisce</text>

    <!-- Rule 2 -->
    <circle cx="18" cy="62" r="14" fill="#2563eb"/>
    <text x="18" y="67" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">2</text>
    <text x="42" y="67" fill="#333" font-size="14">MAI sorpassare un veicolo fermo davanti alle strisce pedonali</text>

    <!-- Rule 3 -->
    <circle cx="18" cy="94" r="14" fill="#2563eb"/>
    <text x="18" y="99" text-anchor="middle" fill="#fff" font-size="15" font-weight="bold">3</text>
    <text x="42" y="99" fill="#333" font-size="14">Attenzione particolare a bambini, anziani e persone con disabilità</text>
  </g>

  <!-- VIETATO box -->
  <g transform="translate(50, 420)">
    <rect x="0" y="0" width="380" height="150" rx="10" fill="#fff" stroke="#dc2626" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="38" rx="10" fill="#dc2626"/>
    <rect x="0" y="20" width="380" height="18" fill="#dc2626"/>
    <text x="190" y="26" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">VIETATO</text>

    <!-- X icons + text -->
    <text x="30" y="65" fill="#dc2626" font-size="16" font-weight="bold">✕</text>
    <text x="50" y="65" fill="#333" font-size="14">Sorpassare veicoli fermi alle strisce</text>

    <text x="30" y="92" fill="#dc2626" font-size="16" font-weight="bold">✕</text>
    <text x="50" y="92" fill="#333" font-size="14">Sostare sulle strisce pedonali</text>

    <text x="30" y="119" fill="#dc2626" font-size="16" font-weight="bold">✕</text>
    <text x="50" y="119" fill="#333" font-size="14">Inversione sulle strisce pedonali</text>

    <text x="30" y="143" fill="#dc2626" font-size="16" font-weight="bold">✕</text>
    <text x="50" y="143" fill="#333" font-size="14">Fermarsi sopra le strisce</text>
  </g>

  <!-- CONSENTITO box -->
  <g transform="translate(470, 420)">
    <rect x="0" y="0" width="380" height="150" rx="10" fill="#fff" stroke="#16a34a" stroke-width="2"/>
    <rect x="0" y="0" width="380" height="38" rx="10" fill="#16a34a"/>
    <rect x="0" y="20" width="380" height="18" fill="#16a34a"/>
    <text x="190" y="26" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">CONSENTITO</text>

    <!-- Check icons + text -->
    <text x="30" y="65" fill="#16a34a" font-size="16" font-weight="bold">✓</text>
    <text x="50" y="65" fill="#333" font-size="14">Proseguire solo se nessun pedone</text>
    <text x="50" y="82" fill="#333" font-size="14">sta attraversando</text>

    <text x="30" y="110" fill="#16a34a" font-size="16" font-weight="bold">✓</text>
    <text x="50" y="110" fill="#333" font-size="14">Fermarsi prima delle strisce per</text>
    <text x="50" y="127" fill="#333" font-size="14">dare precedenza ai pedoni</text>

    <text x="30" y="143" fill="#16a34a" font-size="16" font-weight="bold">✓</text>
    <text x="50" y="143" fill="#333" font-size="14">Transitare a passo d'uomo se libero</text>
  </g>

  <!-- Yellow reminder box -->
  <g transform="translate(50, 595)">
    <rect x="0" y="0" width="800" height="55" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
    <text x="30" y="22" fill="#856404" font-size="16" font-weight="bold">⚠ RICORDA</text>
    <text x="30" y="43" fill="#856404" font-size="14">Il pedone sulle strisce ha SEMPRE la precedenza. In caso di incidente, il conducente ha quasi sempre torto.</text>
  </g>

  <!-- Penalty info -->
  <g transform="translate(50, 668)">
    <rect x="0" y="0" width="800" height="40" rx="6" fill="#e8f0fe" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="30" y="25" fill="#1e40af" font-size="13" font-weight="bold">Sanzioni:</text>
    <text x="100" y="25" fill="#1e40af" font-size="13">Mancata precedenza al pedone = multa + decurtazione punti patente</text>
  </g>
</svg>