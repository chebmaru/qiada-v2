<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#f0f4f0"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">ESECUZIONE DEL SORPASSO</text>
  <text x="400" y="55" text-anchor="middle" fill="#555" font-size="13">3 fasi: segnalare — superare — rientrare</text>

  <!-- Road -->
  <rect x="50" y="80" width="700" height="140" fill="#555" rx="4"/>
  <line x1="50" y1="150" x2="750" y2="150" stroke="#fff" stroke-width="3" stroke-dasharray="30,20"/>
  <line x1="50" y1="82" x2="750" y2="82" stroke="#fff" stroke-width="3"/>
  <line x1="50" y1="218" x2="750" y2="218" stroke="#fff" stroke-width="3"/>

  <!-- Direction arrows on road -->
  <g opacity="0.4">
    <polygon points="720,115 740,120 720,125" fill="#fff"/>
    <polygon points="100,175 80,180 100,185" fill="#fff"/>
  </g>

  <!-- Slow car (gray) - in right lane, facing RIGHT -->
  <g transform="translate(400, 180)">
    <rect x="-26" y="-16" width="52" height="32" rx="7" fill="#888" stroke="#666" stroke-width="1.5"/>
    <rect x="12" y="-12" width="10" height="24" rx="3" fill="#bbb" opacity="0.6"/>
    <rect x="-20" y="-12" width="8" height="24" rx="3" fill="#bbb" opacity="0.4"/>
    <!-- Wheels -->
    <rect x="-20" y="-20" width="12" height="5" rx="1.5" fill="#444"/>
    <rect x="-20" y="15" width="12" height="5" rx="1.5" fill="#444"/>
    <rect x="8" y="-20" width="12" height="5" rx="1.5" fill="#444"/>
    <rect x="8" y="15" width="12" height="5" rx="1.5" fill="#444"/>
  </g>

  <!-- PHASE 1: Red car in right lane behind slow car, facing RIGHT -->
  <g transform="translate(200, 180)">
    <rect x="-26" y="-16" width="52" height="32" rx="7" fill="#dc2626" stroke="#991b1b" stroke-width="1.5"/>
    <rect x="12" y="-12" width="10" height="24" rx="3" fill="#fca5a5" opacity="0.7"/>
    <rect x="-20" y="-12" width="8" height="24" rx="3" fill="#fca5a5" opacity="0.4"/>
    <!-- Wheels -->
    <rect x="-20" y="-20" width="12" height="5" rx="1.5" fill="#444"/>
    <rect x="-20" y="15" width="12" height="5" rx="1.5" fill="#444"/>
    <rect x="8" y="-20" width="12" height="5" rx="1.5" fill="#444"/>
    <rect x="8" y="15" width="12" height="5" rx="1.5" fill="#444"/>
    <!-- Left blinker -->
    <rect x="-26" y="-16" width="6" height="8" rx="2" fill="#f59e0b" opacity="0.9"/>
  </g>
  <!-- Phase 1 label -->
  <circle cx="200" cy="240" r="14" fill="#dc2626"/>
  <text x="200" y="245" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">1</text>
  <text x="200" y="268" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Segnala</text>
  <text x="200" y="281" text-anchor="middle" fill="#555" font-size="10">+ specchietto</text>

  <!-- Curved arrow from pos1 to pos2 -->
  <path d="M 230,170 C 280,100 380,90 430,105" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="428,99 436,105 428,111" fill="#dc2626"/>

  <!-- PHASE 2: Ghost car in left lane overtaking, facing RIGHT -->
  <g transform="translate(470, 120)" opacity="0.5">
    <rect x="-26" y="-16" width="52" height="32" rx="7" fill="#dc2626" stroke="#991b1b" stroke-width="1.5"/>
    <rect x="12" y="-12" width="10" height="24" rx="3" fill="#fca5a5" opacity="0.7"/>
  </g>
  <!-- Phase 2 label -->
  <circle cx="470" cy="72" r="14" fill="#f59e0b"/>
  <text x="470" y="77" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">2</text>
  <text x="470" y="60" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Supera</text>

  <!-- Curved arrow from pos2 to pos3 -->
  <path d="M 500,115 C 550,95 600,110 640,165" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6,4"/>
  <polygon points="636,162 644,170 636,174" fill="#dc2626"/>

  <!-- PHASE 3: Ghost car back in right lane ahead of slow car, facing RIGHT -->
  <g transform="translate(660, 180)" opacity="0.5">
    <rect x="-26" y="-16" width="52" height="32" rx="7" fill="#dc2626" stroke="#991b1b" stroke-width="1.5"/>
    <rect x="12" y="-12" width="10" height="24" rx="3" fill="#fca5a5" opacity="0.7"/>
    <!-- Right blinker -->
    <rect x="-26" y="8" width="6" height="8" rx="2" fill="#f59e0b" opacity="0.9"/>
  </g>
  <!-- Phase 3 label -->
  <circle cx="660" cy="240" r="14" fill="#16a34a"/>
  <text x="660" y="245" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">3</text>
  <text x="660" y="268" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Rientra</text>
  <text x="660" y="281" text-anchor="middle" fill="#555" font-size="10">con distanza</text>

  <!-- Rules box -->
  <rect x="80" y="310" width="640" height="170" rx="10" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="400" y="340" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">Regole del sorpasso</text>

  <!-- Rules grid -->
  <g transform="translate(120, 360)">
    <circle cx="10" cy="10" r="10" fill="#16a34a"/>
    <text x="10" y="15" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">&#x2713;</text>
    <text x="30" y="15" fill="#333" font-size="12">Sempre a SINISTRA (su strade normali)</text>

    <circle cx="10" cy="40" r="10" fill="#16a34a"/>
    <text x="10" y="45" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">&#x2713;</text>
    <text x="30" y="45" fill="#333" font-size="12">Controllare specchietto + angolo cieco</text>

    <circle cx="10" cy="70" r="10" fill="#16a34a"/>
    <text x="10" y="75" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">&#x2713;</text>
    <text x="30" y="75" fill="#333" font-size="12">Segnalare con freccia sinistra, poi destra</text>
  </g>

  <g transform="translate(420, 360)">
    <circle cx="10" cy="10" r="10" fill="#dc2626"/>
    <text x="10" y="15" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">&#x2717;</text>
    <text x="30" y="15" fill="#333" font-size="12">In curva o al dosso</text>

    <circle cx="10" cy="40" r="10" fill="#dc2626"/>
    <text x="10" y="45" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">&#x2717;</text>
    <text x="30" y="45" fill="#333" font-size="12">Vicino a incroci (senza semaforo)</text>

    <circle cx="10" cy="70" r="10" fill="#dc2626"/>
    <text x="10" y="75" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">&#x2717;</text>
    <text x="30" y="75" fill="#333" font-size="12">Con striscia continua</text>
  </g>
</svg>
