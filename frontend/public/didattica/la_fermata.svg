<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Arial, sans-serif">
  <rect width="900" height="450" fill="#f0f4f0"/>
  <text x="450" y="35" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">FERMATA vs SOSTA</text>
  <text x="450" y="55" text-anchor="middle" fill="#555" font-size="13">Due concetti diversi — la differenza è fondamentale</text>

  <!-- FERMATA section -->
  <g transform="translate(0,70)">
    <rect x="50" y="0" width="380" height="180" rx="10" fill="#fff" stroke="#16a34a" stroke-width="2"/>
    <rect x="50" y="0" width="380" height="40" rx="10" fill="#16a34a"/>
    <rect x="50" y="20" width="380" height="20" fill="#16a34a"/>
    <text x="240" y="27" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">FERMATA</text>

    <!-- Road with car stopped briefly -->
    <rect x="70" y="55" width="340" height="35" fill="#555" rx="3"/>
    <line x1="70" y1="72" x2="410" y2="72" stroke="#fff" stroke-width="1.5" stroke-dasharray="10,8"/>

    <!-- Car stopped with person getting out -->
    <g transform="translate(200, 63)">
      <rect x="-18" y="-8" width="36" height="16" rx="4" fill="#16a34a" stroke="#15803d" stroke-width="1"/>
      <rect x="8" y="-6" width="6" height="12" rx="2" fill="#86efac" opacity="0.6"/>
    </g>
    <!-- Person next to car -->
    <circle cx="230" cy="58" r="5" fill="#333"/>
    <line x1="230" y1="63" x2="230" y2="75" stroke="#333" stroke-width="1.5"/>

    <!-- Clock icon showing brief time -->
    <circle cx="340" cy="65" r="12" fill="none" stroke="#16a34a" stroke-width="1.5"/>
    <line x1="340" y1="65" x2="340" y2="57" stroke="#16a34a" stroke-width="1.5"/>
    <line x1="340" y1="65" x2="346" y2="65" stroke="#16a34a" stroke-width="1.5"/>
    <text x="340" y="85" text-anchor="middle" fill="#16a34a" font-size="10">Breve</text>

    <text x="240" y="115" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Tempo strettamente necessario</text>
    <text x="240" y="135" text-anchor="middle" fill="#555" font-size="12">Salita/discesa passeggeri</text>
    <text x="240" y="152" text-anchor="middle" fill="#555" font-size="12">Carico/scarico cose</text>
    <text x="240" y="169" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="bold">Motore acceso, conducente a bordo</text>
  </g>

  <!-- SOSTA section -->
  <g transform="translate(460,70)">
    <rect x="0" y="0" width="390" height="180" rx="10" fill="#fff" stroke="#dc2626" stroke-width="2"/>
    <rect x="0" y="0" width="390" height="40" rx="10" fill="#dc2626"/>
    <rect x="0" y="20" width="390" height="20" fill="#dc2626"/>
    <text x="195" y="27" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold">SOSTA</text>

    <!-- Road with parked car -->
    <rect x="20" y="55" width="350" height="35" fill="#555" rx="3"/>
    <line x1="20" y1="72" x2="370" y2="72" stroke="#fff" stroke-width="1.5" stroke-dasharray="10,8"/>

    <!-- Parked car, no person -->
    <g transform="translate(150, 63)">
      <rect x="-18" y="-8" width="36" height="16" rx="4" fill="#dc2626" stroke="#991b1b" stroke-width="1"/>
      <rect x="8" y="-6" width="6" height="12" rx="2" fill="#fca5a5" opacity="0.6"/>
    </g>

    <!-- Clock icon showing long time -->
    <circle cx="300" cy="65" r="12" fill="none" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="300" y1="65" x2="300" y2="57" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="300" y1="65" x2="293" y2="62" stroke="#dc2626" stroke-width="1.5"/>
    <text x="300" y="85" text-anchor="middle" fill="#dc2626" font-size="10">Lungo</text>

    <text x="195" y="115" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">Sospensione della marcia</text>
    <text x="195" y="135" text-anchor="middle" fill="#555" font-size="12">Per motivi NON legati a circolazione</text>
    <text x="195" y="152" text-anchor="middle" fill="#555" font-size="12">(semaforo, precedenza = NON sosta)</text>
    <text x="195" y="169" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold">Motore spento, conducente può allontanarsi</text>
  </g>

  <!-- Comparison table -->
  <g transform="translate(50, 270)">
    <rect x="0" y="0" width="800" height="160" rx="8" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <!-- Header -->
    <rect x="0" y="0" width="800" height="30" rx="8" fill="#f5f5f5"/>
    <rect x="0" y="15" width="800" height="15" fill="#f5f5f5"/>
    <text x="200" y="20" text-anchor="middle" fill="#555" font-size="12" font-weight="bold">Caratteristica</text>
    <text x="500" y="20" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="bold">FERMATA</text>
    <text x="700" y="20" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold">SOSTA</text>

    <line x1="350" y1="0" x2="350" y2="160" stroke="#eee" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="160" stroke="#eee" stroke-width="1"/>

    <!-- Row 1 -->
    <text x="200" y="52" text-anchor="middle" fill="#333" font-size="12">Durata</text>
    <text x="500" y="52" text-anchor="middle" fill="#16a34a" font-size="12">Brevissima</text>
    <text x="700" y="52" text-anchor="middle" fill="#dc2626" font-size="12">Prolungata</text>
    <line x1="20" y1="60" x2="780" y2="60" stroke="#f0f0f0" stroke-width="1"/>

    <!-- Row 2 -->
    <text x="200" y="82" text-anchor="middle" fill="#333" font-size="12">Conducente</text>
    <text x="500" y="82" text-anchor="middle" fill="#16a34a" font-size="12">Resta a bordo</text>
    <text x="700" y="82" text-anchor="middle" fill="#dc2626" font-size="12">Può allontanarsi</text>
    <line x1="20" y1="90" x2="780" y2="90" stroke="#f0f0f0" stroke-width="1"/>

    <!-- Row 3 -->
    <text x="200" y="112" text-anchor="middle" fill="#333" font-size="12">Motore</text>
    <text x="500" y="112" text-anchor="middle" fill="#16a34a" font-size="12">Acceso</text>
    <text x="700" y="112" text-anchor="middle" fill="#dc2626" font-size="12">Spento</text>
    <line x1="20" y1="120" x2="780" y2="120" stroke="#f0f0f0" stroke-width="1"/>

    <!-- Row 4 -->
    <text x="200" y="145" text-anchor="middle" fill="#333" font-size="12">Motivo</text>
    <text x="500" y="145" text-anchor="middle" fill="#16a34a" font-size="12">Persone/cose</text>
    <text x="700" y="145" text-anchor="middle" fill="#dc2626" font-size="12">Qualsiasi</text>
  </g>
</svg>