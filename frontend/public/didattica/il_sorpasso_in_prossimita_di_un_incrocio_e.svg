<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, sans-serif">
  <rect width="900" height="500" fill="#f0f4f0"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a">SORPASSO IN PROSSIMITA DI UN INCROCIO</text>
  <text x="450" y="52" text-anchor="middle" font-size="15" fill="#555">Regole diverse a seconda della precedenza</text>

  <!-- Horizontal road -->
  <rect x="50" y="160" width="800" height="120" fill="#555"/>
  <!-- Vertical road -->
  <rect x="390" y="65" width="120" height="280" fill="#555"/>

  <!-- Edge lines horizontal -->
  <line x1="50" y1="162" x2="390" y2="162" stroke="#fff" stroke-width="2.5"/>
  <line x1="510" y1="162" x2="850" y2="162" stroke="#fff" stroke-width="2.5"/>
  <line x1="50" y1="278" x2="390" y2="278" stroke="#fff" stroke-width="2.5"/>
  <line x1="510" y1="278" x2="850" y2="278" stroke="#fff" stroke-width="2.5"/>

  <!-- Edge lines vertical -->
  <line x1="392" y1="65" x2="392" y2="160" stroke="#fff" stroke-width="2.5"/>
  <line x1="392" y1="280" x2="392" y2="345" stroke="#fff" stroke-width="2.5"/>
  <line x1="508" y1="65" x2="508" y2="160" stroke="#fff" stroke-width="2.5"/>
  <line x1="508" y1="280" x2="508" y2="345" stroke="#fff" stroke-width="2.5"/>

  <!-- Center dashed horizontal -->
  <line x1="50" y1="220" x2="390" y2="220" stroke="#fff" stroke-width="2" stroke-dasharray="15,10"/>
  <line x1="510" y1="220" x2="850" y2="220" stroke="#fff" stroke-width="2" stroke-dasharray="15,10"/>

  <!-- Center dashed vertical -->
  <line x1="450" y1="65" x2="450" y2="160" stroke="#fff" stroke-width="2" stroke-dasharray="15,10"/>
  <line x1="450" y1="280" x2="450" y2="345" stroke="#fff" stroke-width="2" stroke-dasharray="15,10"/>

  <!-- Direction arrows -->
  <g opacity="0.3">
    <polygon points="120,250 140,253 120,256" fill="#fff"/>
    <polygon points="780,190 760,187 780,184" fill="#fff"/>
  </g>

  <!-- Danger zone highlight on intersection -->
  <rect x="390" y="160" width="120" height="120" fill="rgba(220,38,38,0.08)" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Blue car (being overtaken) — bottom lane -->
  <g transform="translate(270, 250)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#2563eb" stroke="#1e40af" stroke-width="1.5"/>
    <rect x="10" y="-9" width="8" height="18" rx="2" fill="#93c5fd" opacity="0.6"/>
  </g>

  <!-- Red car (attempting overtake) — top lane -->
  <g transform="translate(330, 190)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#dc2626" stroke="#991b1b" stroke-width="1.5"/>
    <rect x="10" y="-9" width="8" height="18" rx="2" fill="#fca5a5" opacity="0.6"/>
  </g>

  <!-- X mark on red car -->
  <line x1="358" y1="178" x2="370" y2="190" stroke="#dc2626" stroke-width="3"/>
  <line x1="370" y1="178" x2="358" y2="190" stroke="#dc2626" stroke-width="3"/>

  <!-- Overtake arrow -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#dc2626"/>
    </marker>
  </defs>
  <path d="M 285,248 Q 280,220 295,195 Q 310,185 325,185" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>

  <!-- Orange car from side street -->
  <g transform="translate(460, 120) rotate(90)">
    <rect x="-22" y="-12" width="44" height="24" rx="6" fill="#ea580c" stroke="#c2410c" stroke-width="1.5"/>
    <rect x="10" y="-9" width="8" height="18" rx="2" fill="#fed7aa" opacity="0.6"/>
  </g>

  <!-- Labels ON road with dark background — no overlapping -->
  <rect x="308" y="163" width="55" height="14" rx="3" fill="#000" opacity="0.4"/>
  <text x="335" y="174" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="bold">VIETATO</text>

  <rect x="232" y="265" width="75" height="14" rx="3" fill="#000" opacity="0.4"/>
  <text x="270" y="276" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="bold">auto davanti</text>

  <rect x="425" y="78" width="60" height="14" rx="3" fill="#000" opacity="0.4"/>
  <text x="455" y="89" text-anchor="middle" fill="#fed7aa" font-size="11" font-weight="bold">PERICOLO</text>

  <!-- Scenario labels OUTSIDE the road, clearly separated -->
  <!-- Left: senza precedenza -->
  <g transform="translate(120, 310)">
    <rect x="-70" y="-14" width="140" height="42" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="0" y="0" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="bold">SENZA PRECEDENZA</text>
    <text x="0" y="16" text-anchor="middle" fill="#dc2626" font-size="12">= VIETATO sorpassare</text>
  </g>

  <!-- Right: con precedenza -->
  <g transform="translate(770, 310)">
    <rect x="-70" y="-14" width="140" height="42" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="0" y="0" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="bold">CON PRECEDENZA</text>
    <text x="0" y="16" text-anchor="middle" fill="#16a34a" font-size="12">= CONSENTITO</text>
  </g>

  <!-- Info boxes -->
  <g transform="translate(50, 370)">
    <rect x="0" y="0" width="260" height="80" rx="8" fill="#fff" stroke="#dc2626" stroke-width="2"/>
    <text x="130" y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="bold">VIETATO</text>
    <text x="10" y="40" fill="#555" font-size="12">Incroci NON regolati</text>
    <text x="10" y="56" fill="#555" font-size="12">Senza precedenza</text>
    <text x="10" y="72" fill="#555" font-size="12">Attraversamenti pedonali</text>
  </g>

  <g transform="translate(330, 370)">
    <rect x="0" y="0" width="260" height="80" rx="8" fill="#fff" stroke="#16a34a" stroke-width="2"/>
    <text x="130" y="20" text-anchor="middle" fill="#16a34a" font-size="14" font-weight="bold">CONSENTITO</text>
    <text x="10" y="40" fill="#555" font-size="12">Con precedenza</text>
    <text x="10" y="56" fill="#555" font-size="12">Regolato da semaforo</text>
    <text x="10" y="72" fill="#555" font-size="12">Bici/carretti senza invadere</text>
  </g>

  <g transform="translate(610, 370)">
    <rect x="0" y="0" width="240" height="80" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
    <text x="120" y="20" text-anchor="middle" fill="#856404" font-size="14" font-weight="bold">RICORDA</text>
    <text x="10" y="40" fill="#856404" font-size="12">Sorpasso agli incroci:</text>
    <text x="10" y="56" fill="#856404" font-size="12" font-weight="bold">SOLO con precedenza</text>
    <text x="10" y="72" fill="#856404" font-size="12">o semaforo a favore</text>
  </g>
</svg>