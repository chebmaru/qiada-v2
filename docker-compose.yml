services:
  db:
    image: postgres:16-alpine
    container_name: qiada-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: qiada
      POSTGRES_PASSWORD: qiada_dev
      POSTGRES_DB: qiada_v2
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
